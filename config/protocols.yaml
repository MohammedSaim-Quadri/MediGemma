clinical_protocols:
  # --- CRITICAL: Infection & Sepsis ---
  infection_suspected:
    name: "Potential Wound Infection"
    severity: "Critical"
    management:
      - "Clinical Assessment: Check for systemic symptoms (fever, chills)."
      - "Diagnostics: Obtain deep tissue culture or swab."
      - "Action: Notify provider for potential empiric antibiotics."
      - "Wound Care: Use antimicrobial dressings (Silver, Iodine)."

  # --- HIGH SEVERITY: Etiologies ---
  diabetic_foot_ulcer:
    name: "Diabetic Foot Ulcer"
    severity: "High"
    management:
      - "Offloading: Total Contact Casting or surgical shoe."
      - "Glycemic Control: Target HbA1c < 7%."
      - "Debridement: Removal of non-viable tissue."

  pressure_injury:
    name: "Pressure Injury"
    severity: "High"
    management:
      - "Offloading: Turn patient every 2 hours."
      - "Support Surfaces: Use air-fluidized or alternating pressure mattress."
      - "Nutrition: High protein diet to support healing."

  venous_leg_ulcer:
    name: "Venous Leg Ulcer"
    severity: "Medium"
    management:
      - "Compression: Multi-layer compression therapy (if ABI > 0.8)."
      - "Elevation: Elevate legs above heart level."
      - "Moisture Balance: Absorbent dressings."

  surgical_wound:
    name: "Surgical Site / Dehiscence"
    severity: "Medium"
    management:
      - "Protection: Keep clean and dry."
      - "Assessment: Monitor for dehiscence or evisceration."

  # --- VISUAL BRIDGES (The LLaVA Catchers) ---
  necrotic_tissue:
    name: "Necrotic Tissue / Slough Management"
    severity: "High"
    management:
      - "Debridement: Consult for sharp or enzymatic (Santyl) debridement."
      - "Assessment: Differentiate stable eschar (keep dry) vs slough."
      - "Perfusion: Ensure arterial flow before debriding."

  wound_drainage:
    name: "High Exudate Management"
    severity: "Moderate"
    management:
      - "Absorption: Use superabsorbent polymers or alginates."
      - "Protection: Apply zinc oxide to peri-wound skin to prevent maceration."
      - "Frequency: Increase dressing change frequency."

  # --- LOWEST PRIORITY: Normal ---
  normal_skin:
    name: "Intact Skin / Prevention"
    severity: "Low"
    management:
      - "Daily Monitoring: Inspect for new redness or breakdown."
      - "Moisturization: Apply emollient to dry areas."
      - "Prevention: Maintain offloading schedule."