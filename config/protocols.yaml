clinical_protocols:
  # --- LEVEL 1: CRITICAL / LIFE THREAT (The "Killers") ---
  # Triggered by: dishwater, gas, crepitus, necrotizing
  critical_infection:
    name: "🚨 CRITICAL: POSSIBLE NECROTIZING INFECTION"
    severity: "Critical"
    management:
      - "IMMEDIATE ACTION: Surgical Consult (Rule out NSTI)."
      - "Imaging: MRI or CT to assess gas/deep fascial involvement."
      - "Pharmacology: Initiate Broad-Spectrum IV Antibiotics immediately."
      - "Prep: Prepare for emergency surgical debridement."

  # --- LEVEL 2: ACTIVE INFECTION (The "Acute" Threat) ---
  # Triggered by: "Infection: Yes", pus, purulent, abscess
  infection_suspected:
    name: "Active Infection Protocol"
    severity: "High"
    management:
      - "Diagnostics: Obtain Deep Tissue Culture (Biopsy) or Quantitative PCR."
      - "Pharmacology: Start Empiric Antibiotics per Stewardship Guidelines."
      - "Imaging: Rule out Osteomyelitis (X-Ray) if bone is exposed."
      - "Wound Care: Use antimicrobial dressings (Silver, Iodine, Honey)."

  # --- LEVEL 3: TISSUE DEFICIT / NECROSIS ---
  # Triggered by: eschar, black tissue, slough, necrosis, pressure injury
  pressure_injury:
    name: "Debridement & Necrosis Protocol"
    severity: "High"
    management:
      - "Vascular Check: Evaluate TCOM or ABI before sharp debridement."
      - "Debridement: Enzymatic (Santyl) or Mechanical removal of slough/eschar."
      - "Offloading: Total pressure relief (Air-fluidized therapy/Turning)."
      - "Nutrition: High protein/Arginine supplementation."

  # --- LEVEL 4: DIABETIC / NEUROPATHIC ---
  # Triggered by: diabetic, neuropathy, plantar
  diabetic_foot_ulcer:
    name: "Diabetic Foot Ulcer Protocol"
    severity: "High"
    management:
      - "Offloading: Total Contact Cast (TCC) is Gold Standard."
      - "Vascular: Non-invasive vascular studies (Arterial/Venous)."
      - "Metabolic: Strict Glucose Control (Target HbA1c < 7%)."
      - "Monitoring: Watch for Charcot Foot signs."

  # --- LEVEL 5: STANDARD CARE (Maintenance) ---
  # Triggered by: surgical, venous, or fallback
  surgical_wound:
    name: "Surgical Site Management"
    severity: "Medium"
    management:
      - "Protection: Maintain sterile barrier."
      - "Assessment: Monitor for dehiscence or seroma."
      - "Drainage: Manage exudate with appropriate absorbency."

  venous_leg_ulcer:
    name: "Venous Leg Ulcer Protocol"
    severity: "Medium"
    management:
      - "Compression: Multi-layer compression if Arterial Status permits."
      - "Elevation: Legs above heart level."
      - "Exudate: Absorbent dressings (Foams/Alginates)."

  general_care:
    name: "Standard Granulation Care"
    severity: "Low"
    management:
      - "Environment: Maintain moist wound healing (Hydrogel/Foam)."
      - "Periwound: Protect edges with barrier film."
      - "Monitoring: Weekly measurements (Length x Width x Depth)."