clinical_protocols:
  # --- CRITICAL: Infection & Sepsis ---
  # Triggered by: pus, purulence, abscess, malodor, redness, hot to touch
  infection_suspected:
    name: "Active Infection Protocol"
    severity: "Critical"
    management:
      - "Immediate Action: Obtain deep tissue culture or swab."
      - "Pharmacology: Notify provider for empiric antibiotics."
      - "Wound Care: Use antimicrobial dressings (Silver, Iodine, Honey)."
      - "Systemic Check: Monitor for fever, chills, or hypotension (Sepsis)."

  # --- HIGH SEVERITY: Etiologies ---
  
  # Triggered by: sacrum, heel, stage 3/4, eschar, black tissue, necrosis
  pressure_injury:
    name: "Pressure Injury / Necrosis Protocol"
    severity: "High"
    management:
      - "Offloading: Turn patient q2h; float heels; use air-fluidized mattress."
      - "Debridement: Consult for removal of black eschar/slough (if flow is adequate)."
      - "Nutrition: Increase protein intake (Arginine/Zinc) to support granulation."
      - "Protection: Do NOT debride stable dry eschar on heels."

  # Triggered by: diabetic, DFU, neuropathy, plantar, gangrene
  diabetic_foot_ulcer:
    name: "Diabetic Foot Ulcer Protocol"
    severity: "High"
    management:
      - "Offloading: Total Contact Cast (TCC) or surgical shoe is mandatory."
      - "Metabolic: Target HbA1c < 7%; manage blood glucose."
      - "Perfusion: Check ABI/TBI before any sharp debridement."
      - "Infection Risk: Monitor closely for osteomyelitis."

  # --- MEDIUM SEVERITY ---

  # Triggered by: surgical, incision, dehiscence, sutures
  surgical_wound:
    name: "Surgical Site Management"
    severity: "Medium"
    management:
      - "Protection: Keep incision clean and dry."
      - "Assessment: Monitor for dehiscence (separation) or evisceration."
      - "Drainage: If high output, consider pouching or negative pressure (wound vac)."

  # Triggered by: venous, edema, hemosiderin, leg ulcer
  venous_leg_ulcer:
    name: "Venous Leg Ulcer Protocol"
    severity: "Medium"
    management:
      - "Compression: Multi-layer compression (Profore/Unna Boot) if ABI > 0.8."
      - "Elevation: Elevate legs above heart level 3-4x daily."
      - "Exudate Control: Use superabsorbent pads for high drainage."

  # --- LOWEST PRIORITY: Fallback ---
  # Triggered by: Fallback (no other keywords found)
  general_care:
    name: "General Wound Care / Intact Skin"
    severity: "Low"
    management:
      - "Hygiene: Cleanse with normal saline or wound cleanser."
      - "Moisture Balance: Maintain moist wound environment (not wet, not dry)."
      - "Prevention: Inspect skin daily for new breakdown."